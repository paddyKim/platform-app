spring.application.name=backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:platform}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:platform}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
