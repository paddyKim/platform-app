services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: platform
      MARIADB_USER: platform
      MARIADB_PASSWORD: platform
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/platform
      SPRING_DATASOURCE_USERNAME: platform
      SPRING_DATASOURCE_PASSWORD: platform
      APP_CORS_ALLOWED_ORIGIN: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb-data:
